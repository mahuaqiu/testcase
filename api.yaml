# Worker API 接口说明
# Base URL: http://{host}:{port} (默认端口 8080)

openapi: "3.0.0"
info:
  title: "Test Worker API"
  description: "多端自动化测试执行基建 API"
  version: "3.0.0"

servers:
  - url: "http://{host}:{port}"
    variables:
      host:
        default: "localhost"
      port:
        default: "8080"

paths:
  /worker_devices:
    get:
      summary: "获取 Worker 状态和设备信息"
      description: "获取 Worker 状态及所有连接设备信息"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              example:
                worker_id: "worker_abc123"
                status: "running"
                started_at: "2026-03-14T10:00:00.000000"
                supported_platforms: ["web", "windows", "android", "ios"]
                devices:
                  web: []
                  windows: []
                  android:
                    - id: "emulator-5554"
                      status: "idle"
                  ios:
                    - id: "00008030-001234567890ABCD"
                      status: "idle"
        "503":
          description: "Worker 未初始化"

  /task/execute:
    post:
      summary: "同步执行任务"
      description: "同步执行自动化测试任务，阻塞等待结果返回，不生成 task_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskRequest"
            example:
              platform: "web"
              actions:
                - action_type: "navigate"
                  value: "https://example.com"
                - action_type: "ocr_click"
                  value: "登录"
                - action_type: "screenshot"
                  value: "result"
              device_id: null
      responses:
        "200":
          description: "任务执行完成（不包含 task_id）"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResult"
        "503":
          description: "Worker 未初始化"

  /task/execute_async:
    post:
      summary: "异步执行任务"
      description: "异步执行自动化测试任务，立即返回 task_id，任务在后台执行"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskRequest"
            example:
              platform: "web"
              actions:
                - action_type: "navigate"
                  value: "https://example.com"
                - action_type: "ocr_click"
                  value: "登录"
      responses:
        "200":
          description: "任务已提交"
          content:
            application/json:
              example:
                task_id: "task_20260317_120000_abc123"
                status: "running"
        "409":
          description: "设备/平台冲突"
          content:
            application/json:
              example:
                detail: "Device/Platform is busy"
        "503":
          description: "Worker 未初始化"

  /task/{task_id}:
    get:
      summary: "查询任务结果"
      description: "根据任务 ID 查询执行结果。一次性查询：查询后任务从内存中销毁，再次查询返回 404"
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "任务状态或结果"
          content:
            application/json:
              examples:
                running:
                  summary: "执行中"
                  value:
                    task_id: "task_20260317_120000_abc123"
                    status: "running"
                completed:
                  summary: "执行完成"
                  value:
                    task_id: "task_20260317_120000_abc123"
                    status: "success"
                    platform: "web"
                    duration_ms: 1500
                    actions: []
        "404":
          description: "任务不存在"
          content:
            application/json:
              example:
                detail: "Task not found"
        "503":
          description: "Worker 未初始化"

    delete:
      summary: "取消任务"
      description: "取消正在执行的任务。取消逻辑：如果只有一个 action，执行完再取消；有多个 action，当前 action 执行完后停止。"
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "取消成功"
          content:
            application/json:
              example:
                success: true
                message: "Task cancelled"
        "404":
          description: "任务不存在"
          content:
            application/json:
              example:
                detail: "Task not found"
        "503":
          description: "Worker 未初始化"

  /devices/refresh:
    post:
      summary: "刷新设备列表"
      description: "重新扫描并更新设备列表"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              example:
                worker_id: "worker_abc123"
                status: "running"
                devices:
                  web: []
                  windows: []
                  android:
                    - id: "emulator-5554"
                      status: "idle"
                  ios:
                    - id: "00008030-001234567890ABCD"
                      status: "idle"
        "503":
          description: "Worker 未初始化"

components:
  schemas:
    TaskRequest:
      type: object
      required:
        - platform
        - actions
      properties:
        platform:
          type: string
          enum: [web, android, ios, windows, mac]
          description: |
            目标平台，支持以下值：
            - web: Web 浏览器自动化（Playwright）
            - android: Android 设备自动化（Appium + UiAutomator2）
            - ios: iOS 设备自动化（Appium + XCUITest）
            - windows: Windows 桌面自动化（pyautogui）
            - mac: macOS 桌面自动化（pyautogui）
        actions:
          type: array
          items:
            $ref: "#/components/schemas/Action"
          description: "动作列表，按顺序依次执行"
        device_id:
          type: string
          description: |
            设备 ID，移动端必填：
            - Web/Windows/Mac: 不需要填写
            - Android: 填写设备序列号，如 "emulator-5554"
            - iOS: 填写设备 UDID，如 "00008030-001234567890ABCD"
        user_id:
          type: string
          description: "用户标识，用于追溯和日志记录"
        config:
          $ref: "#/components/schemas/TaskConfig"
      example:
        platform: "web"
        actions:
          - action_type: "navigate"
            value: "https://example.com"
          - action_type: "ocr_click"
            value: "登录"
            offset:
              x: 0
              y: 0
          - action_type: "screenshot"
            value: "result"

    TaskConfig:
      type: object
      properties:
        timeout:
          type: integer
          default: 300000
          description: "任务总超时时间（毫秒），超过此时间任务将被强制终止"
        action_timeout:
          type: integer
          default: 30000
          description: "单个动作超时时间（毫秒），超过此时间当前动作将失败"
        screenshot_on_error:
          type: boolean
          default: true
          description: "任务失败时是否自动截图，截图将以 base64 编码返回"ss
        slow_motion:
          type: integer
          default: 0
          description: "慢动作延迟（毫秒），每个动作之间插入延迟，便于观察调试"
        retry_count:
          type: integer
          default: 0
          description: "失败重试次数，任务失败后自动重试"
      example:
        timeout: 60000
        action_timeout: 5000
        screenshot_on_error: true
        slow_motion: 500
        retry_count: 1

    Action:
      type: object
      required:
        - action_type
      properties:
        action_type:
          type: string
          enum:
            - ocr_click
            - ocr_input
            - ocr_wait
            - ocr_assert
            - ocr_get_text
            - ocr_paste
            - ocr_move
            - ocr_double_click
            - ocr_exist
            - ocr_click_same_row_text
            - ocr_click_same_row_image
            - ocr_check_same_row_text
            - ocr_check_same_row_image
            - image_click
            - image_wait
            - image_assert
            - image_click_near_text
            - image_move
            - image_double_click
            - image_exist
            - click
            - double_click
            - move
            - swipe
            - input
            - press
            - screenshot
            - wait
            - start_app
            - stop_app
            - navigate
            - switched_page
            - close_page
            - ocr_get_position
            - image_get_position
            - cmd_exec
          description: |
            动作类型，分为以下几类：

            【OCR 文字识别动作】
            - ocr_click: 点击屏幕上识别到的文字
            - ocr_input: 在识别到的文字附近输入文本
            - ocr_wait: 等待指定文字出现
            - ocr_assert: 断言指定文字存在
            - ocr_get_text: 获取屏幕上所有文字
            - ocr_paste: OCR 定位后粘贴剪贴板内容
            - ocr_move: 移动鼠标到识别到的文字位置（仅桌面端）
            - ocr_double_click: 双击屏幕上识别到的文字
            - ocr_exist: 检查文字是否存在，返回 {"exists": true/false}
            - ocr_click_same_row_text: 点击锚点文本同一行的目标文本
            - ocr_click_same_row_image: 点击锚点文本同一行的目标图片
            - ocr_check_same_row_text: 检查锚点文本同一行的目标文本是否存在
            - ocr_check_same_row_image: 检查锚点文本同一行的目标图片是否存在
            - ocr_get_position: 获取文字坐标列表，返回 {"positions": [[x1,y1], [x2,y2], ...]}

            【图像识别动作】
            - image_click: 点击匹配到的图像位置
            - image_wait: 等待指定图像出现
            - image_assert: 断言指定图像存在
            - image_click_near_text: 点击文本附近最近的图像
            - image_move: 移动鼠标到匹配的图像位置（仅桌面端）
            - image_double_click: 双击匹配到的图像位置
            - image_exist: 检查图像是否存在，返回 {"exists": true/false}
            - image_get_position: 获取图片坐标列表，返回 {"positions": [[x1,y1], [x2,y2], ...]}

            【坐标动作】
            - click: 点击指定坐标
            - double_click: 双击指定坐标
            - move: 移动鼠标到指定坐标（仅桌面端）
            - swipe: 滑动手势
            - input: 在指定坐标输入文本

            【其他动作】
            - press: 按键操作
            - screenshot: 截图
            - wait: 固定等待
            - start_app: 启动应用/浏览器
            - stop_app: 关闭应用/浏览器
            - navigate: 跳转 URL（Web 专用）
            - switched_page: 切换到指定页面（Web 专用）
            - close_page: 关闭当前页面（Web 专用）
            - cmd_exec: 在宿主机执行 shell/cmd 命令
        level:
          type: string
          enum: [browser, system]
          default: browser
          description: |
            执行层级，仅 Web 平台支持，用于处理浏览器原生对话框等场景：
            - browser: 使用 Playwright 操作浏览器内部内容（默认）
            - system: 使用系统级操作（mss 截屏 + pyautogui 点击），可截取/操作原生对话框

            适用场景：
            - Web 会议共享桌面弹出的原生选择框（Playwright 无法截取）
            - 文件上传的原生文件选择器对话框
            - 浏览器权限请求弹窗等原生 UI

            示例：点击原生共享对话框中的"屏幕 1"
            {"action_type": "ocr_click", "value": "屏幕 1", "level": "system"}

            注意：system 级别需要安装 mss 和 pyautogui 依赖
        monitor:
          type: integer
          default: 1
          description: |
            截取哪个显示器，仅 Web 平台配合 level: system 使用：
            - 1: 主屏幕（自动识别 left=0 的显示器，即 Windows 设置中的主屏幕）
            - 2: 副屏幕（另一个显示器）

            自动识别规则：系统会自动找到 left=0 的显示器作为主屏幕，
            无需关心 mss 库的原始编号顺序。

            示例：截取第二个显示器上的原生对话框
            {"action_type": "ocr_click", "value": "确认", "level": "system", "monitor": 2}
        value:
          type: string
          description: |
            动作核心值，根据 action_type 不同含义不同：
            - ocr_click/ocr_input/ocr_wait/ocr_assert/ocr_paste/ocr_exist: 要识别的文字内容
              - 支持 `reg_` 前缀正则匹配，如 `reg_\\d+` 匹配数字
              - OCR 统一匹配策略：精确匹配 → 模糊匹配，reg_ 前缀直接使用正则匹配
            - image_click_near_text: 要查找的目标文字
            - click/input: 此字段不使用
            - swipe: 此字段不使用
            - screenshot: 截图名称/标识
            - wait: 等待的毫秒数，如 "1000"
            - start_app: 应用包名或浏览器类型
              - Web: "chromium"、"firefox"、"webkit"
              - Android: 应用包名，如 "com.example.app"
              - iOS: Bundle ID，如 "com.example.app"
            - stop_app: 应用包名（可选，不填则关闭当前应用）
            - navigate: 要跳转的 URL
            - switched_page: 页面索引（从 1 开始），如 "1"、"2"、"3"
            - close_page: 此字段不使用
            - ocr_get_position: 要查找的文字内容（支持 reg_ 前缀正则匹配）
            - cmd_exec: 要执行的命令字符串，如 "echo hello" 或 "dir C:\\Users"
        text:
          type: string
          description: "输入/粘贴的文本内容，仅 ocr_input、input、ocr_paste 动作必填"
        image_base64:
          type: string
          description: |
            图像模板 base64 编码，仅 image_* 动作必填：
            - image_click/image_wait/image_assert: 要匹配的图像模板
            - image_click_near_text: 要查找的图像模板
            - image_get_position: 要查找的图像模板
        index:
          type: integer
          default: 0
          description: |
            选择第几个匹配结果（从 0 开始），用于多个相同文字/图像的场景：
            - ocr_click/ocr_input/ocr_paste/ocr_move/ocr_double_click/ocr_exist: 点击第 N 个匹配的文字
            - image_click/image_wait/image_assert/image_move/image_double_click/image_exist: 点击第 N 个匹配的图像
            示例：index=1 表示点击第二个匹配结果
        anchor_text:
          type: string
          description: |
            锚点文本，仅 ocr_*_same_row_* 动作必填：
            - ocr_click_same_row_text: 锚点文本用于定位水平行
            - ocr_click_same_row_image: 锚点文本用于定位水平行
            - ocr_check_same_row_text: 锚点文本用于定位水平行
            - ocr_check_same_row_image: 锚点文本用于定位水平行
        anchor_index:
          type: integer
          default: 0
          description: |
            锚点文本索引（从 0 开始），用于多个相同锚点文本的场景：
            - ocr_*_same_row_*: 选择第 N 个匹配的锚点文本
            示例：anchor_index=1 表示使用第二个匹配的锚点文本
        row_tolerance:
          type: integer
          default: 20
          description: |
            水平带范围（像素），仅 ocr_*_same_row_* 动作可用：
            - 定义锚点文本上下搜索范围，默认 20 像素
            - 例如 row_tolerance=20 表示在锚点 Y 坐标上下各 20 像素范围内搜索目标
        target_index:
          type: integer
          default: 0
          description: |
            目标索引（从 0 开始），仅 ocr_*_same_row_* 动作可用：
            - ocr_click_same_row_text/ocr_check_same_row_text: 选择同行第 N 个匹配的目标文本
            - ocr_click_same_row_image/ocr_check_same_row_image: 选择同行第 N 个匹配的目标图片
            示例：target_index=1 表示使用同行第二个匹配的目标
        region:
          type: array
          items:
            type: integer
          minItems: 4
          maxItems: 4
          description: |
            操作区域 [x1, y1, x2, y2]，限制 OCR/图像识别在指定矩形区域内执行：
            - x1, y1: 区域左上角坐标
            - x2, y2: 区域右下角坐标
            - 坐标必须为非负整数，且 x1 < x2、y1 < y2
            - 超出图像边界的部分会自动截断
            - 适用动作：所有 ocr_* 和 image_* 动作
            - 使用场景：多画面会场场景，只关注屏幕某一部分的变化
            示例：region=[960, 0, 1920, 540] 表示屏幕右半部分
        offset:
          type: object
          description: |
            相对于识别结果（文字/图像）中心的偏移量，用于微调点击位置：
            - x: 横向偏移（正值向右，负值向左）
            - y: 纵向偏移（正值向下，负值向上）
            示例：{"x": 100, "y": 0} 表示向右偏移 100 像素
          properties:
            x:
              type: integer
              description: "横向偏移（像素）"
            y:
              type: integer
              description: "纵向偏移（像素）"
        threshold:
          type: number
          default: 0.8
          description: "图像匹配阈值（0.0-1.0），仅用于 image_* 动作。值越高匹配越严格，默认 0.8"
        timeout:
          type: integer
          default: 30000
          description: |
            超时时间（毫秒），仅以下动作使用：
            - ocr_wait: 轮询等待文字出现的最大时间
            - image_wait: 轮询等待图像出现的最大时间
            - navigate: 页面加载超时（Web）
            - cmd_exec: 命令执行超时

            其他动作（如 ocr_click、ocr_assert、image_click、image_assert 等）不使用此参数。
        x:
          type: integer
          description: "X 坐标（像素），仅 click、move 和 input 动作必填"
        y:
          type: integer
          description: "Y 坐标（像素），仅 click、move 和 input 动作必填"
        end_x:
          type: integer
          description: |
            终点 X 坐标或扩展参数：
            - swipe: 滑动终点 X 坐标
            - image_click_near_text: 最大搜索距离（像素），默认 500
        end_y:
          type: integer
          description: |
            终点 Y 坐标：
            - swipe: 滑动终点 Y 坐标
        from:
          type: object
          description: "滑动起始坐标，仅 swipe 动作必填"
          properties:
            x:
              type: integer
              description: "起始点 X 坐标"
            y:
              type: integer
              description: "起始点 Y 坐标"
        to:
          type: object
          description: "滑动结束坐标，仅 swipe 动作必填"
          properties:
            x:
              type: integer
              description: "结束点 X 坐标"
            y:
              type: integer
              description: "结束点 Y 坐标"
        duration:
          type: integer
          description: "滑动持续时间（毫秒），仅 swipe 动作可选，默认 500ms"
        key:
          type: string
          description: |
            按键名称，仅 press 动作必填。常用按键：
            - 功能键: Enter、Escape、Tab、Backspace、Delete
            - 方向键: ArrowUp、ArrowDown、ArrowLeft、ArrowRight
            - 修饰键: Control、Alt、Shift、Meta
            - 组合键示例: Control+A、Control+C、Alt+F4
      example:
        action_type: "ocr_wait"
        value: "加载完成"
        timeout: 10000

    TaskResult:
      type: object
      description: "任务执行结果。同步执行时不包含 task_id 字段"
      properties:
        task_id:
          type: string
          description: "任务 ID（仅异步执行返回）"
        status:
          type: string
          enum: [pending, running, success, failed, timeout, cancelled]
          description: "任务状态"
        platform:
          type: string
          description: "平台"
        started_at:
          type: string
          format: date-time
          description: "开始时间"
        finished_at:
          type: string
          format: date-time
          description: "结束时间"
        duration_ms:
          type: integer
          description: "执行耗时(ms)"
        actions:
          type: array
          items:
            $ref: "#/components/schemas/ActionResult"
        error:
          type: string
          description: "错误信息"
        error_screenshot:
          type: string
          description: "失败截图（base64 编码）"

    ActionResult:
      type: object
      properties:
        number:
          type: integer
          description: "动作序号（在任务列表中的位置，从 0 开始）"
        action_type:
          type: string
          description: "动作类型"
        status:
          type: string
          enum: [pending, running, success, failed, skipped]
          description: "动作状态"
        duration_ms:
          type: integer
          description: "执行耗时(ms)"
        output:
          type: string
          description: "输出内容"
        error:
          type: string
          description: "错误信息"
        screenshot:
          type: string
          description: "截图（base64 或路径）"
        exit_code:
          type: integer
          description: "命令退出码（仅 cmd_exec 动作返回），0 表示成功"
        stdout:
          type: string
          description: "命令标准输出（仅 cmd_exec 动作返回）"
        stderr:
          type: string
          description: "命令标准错误输出（仅 cmd_exec 动作返回）"

  # ==================== 动作类型详细示例 ====================
  # 以下为各动作类型的完整传参示例，供调用方参考

  # ---------- OCR 文字识别动作 ----------
  # ocr_click - 点击识别到的文字
  # 示例 1: 点击"登录"按钮
  # {"action_type": "ocr_click", "value": "登录"}
  # 示例 2: 点击"登录"按钮并向右偏移 100 像素（适用于文字右侧有按钮）
  # {"action_type": "ocr_click", "value": "登录", "offset": {"x": 100, "y": 0}}
  # 示例 3: 点击第二个"确定"按钮（index 从 0 开始）
  # {"action_type": "ocr_click", "value": "确定", "index": 1}
  # 示例 4: 仅在屏幕右半部分查找并点击"会场名称"
  # {"action_type": "ocr_click", "value": "会场名称", "region": [960, 0, 1920, 540]}

  # ocr_input - 在文字附近输入文本
  # 示例 1: 在"用户名"标签右侧输入账号
  # {"action_type": "ocr_input", "value": "用户名", "text": "admin", "offset": {"x": 80, "y": 0}}
  # 示例 2: 在第二个"输入框"附近输入内容
  # {"action_type": "ocr_input", "value": "输入框", "text": "hello", "index": 1}

  # ocr_wait - 等待文字出现
  # 示例: 等待"加载完成"出现，最多等 10 秒
  # {"action_type": "ocr_wait", "value": "加载完成", "timeout": 10000}

  # ocr_assert - 断言文字存在（单次截图断言，不使用 timeout）
  # 示例: 断言"操作成功"文字存在
  # {"action_type": "ocr_assert", "value": "操作成功"}

  # ocr_get_text - 获取屏幕所有文字
  # 示例: 获取当前屏幕文字内容
  # {"action_type": "ocr_get_text", "value": ""}

  # ocr_paste - OCR 定位后粘贴剪贴板内容
  # 示例 1: 定位"备注"标签并粘贴内容
  # {"action_type": "ocr_paste", "value": "备注", "text": "这是粘贴的内容", "offset": {"x": 50, "y": 0}}
  # 示例 2: 定位第二个"输入"标签并粘贴内容
  # {"action_type": "ocr_paste", "value": "输入", "text": "粘贴文本", "index": 1}

  # ocr_move - 移动鼠标到识别到的文字位置（仅桌面端支持）
  # 示例 1: 移动鼠标到"登录"文字位置
  # {"action_type": "ocr_move", "value": "登录"}
  # 示例 2: 移动鼠标到"设置"文字右侧
  # {"action_type": "ocr_move", "value": "设置", "offset": {"x": 50, "y": 0}}
  # 示例 3: 移动鼠标到第二个"确定"文字位置
  # {"action_type": "ocr_move", "value": "确定", "index": 1}

  # ocr_double_click - 双击识别到的文字
  # 示例 1: 双击"文件"文字
  # {"action_type": "ocr_double_click", "value": "文件"}
  # 示例 2: 双击第二个"确定"文字
  # {"action_type": "ocr_double_click", "value": "确定", "index": 1}
  # 示例 3: 双击文字并向右偏移
  # {"action_type": "ocr_double_click", "value": "文件", "offset": {"x": 50, "y": 0}}

  # ocr_exist - 检查文字是否存在
  # 返回 {"exists": true} 或 {"exists": false}，无论是否存在都返回 SUCCESS 状态
  # 示例 1: 检查"登录"文字是否存在
  # {"action_type": "ocr_exist", "value": "登录"}
  # 示例 2: 检查第二个"确定"文字是否存在
  # {"action_type": "ocr_exist", "value": "确定", "index": 1}
  # 示例 3: 使用正则匹配检查是否存在数字
  # {"action_type": "ocr_exist", "value": "reg_\\d+"}

  # ocr_click_same_row_text - 点击锚点文本同一行的目标文本
  # 示例 1: 点击"功能名称B"同一行的"开关"文字
  # {"action_type": "ocr_click_same_row_text", "anchor_text": "功能名称B", "value": "开关"}
  # 示例 2: 点击第二个锚点文本同一行的目标，水平带范围 30 像素
  # {"action_type": "ocr_click_same_row_text", "anchor_text": "功能名称", "anchor_index": 1, "value": "开关", "row_tolerance": 30}
  # 示例 3: 点击锚点同一行的第二个目标文本，并偏移
  # {"action_type": "ocr_click_same_row_text", "anchor_text": "功能名称B", "value": "开关", "target_index": 1, "offset": {"x": 10, "y": 0}}

  # ocr_click_same_row_image - 点击锚点文本同一行的目标图片
  # 示例 1: 点击"功能名称B"同一行的开关图标
  # {"action_type": "ocr_click_same_row_image", "anchor_text": "功能名称B", "image_base64": "<base64_encoded_image>", "threshold": 0.8}
  # 示例 2: 点击第二个锚点文本同一行的图片，水平带范围 30 像素
  # {"action_type": "ocr_click_same_row_image", "anchor_text": "功能名称", "anchor_index": 1, "image_base64": "<base64_encoded_image>", "row_tolerance": 30}

  # ocr_check_same_row_text - 检查锚点文本同一行的目标文本是否存在
  # 示例 1: 检查"功能名称B"同一行是否有"开关"文字
  # {"action_type": "ocr_check_same_row_text", "anchor_text": "功能名称B", "value": "开关"}
  # 示例 2: 检查第二个锚点文本同一行的目标，水平带范围 30 像素
  # {"action_type": "ocr_check_same_row_text", "anchor_text": "功能名称", "anchor_index": 1, "value": "开关", "row_tolerance": 30}

  # ocr_check_same_row_image - 检查锚点文本同一行的目标图片是否存在
  # 示例 1: 检查"功能名称B"同一行是否有开关图标
  # {"action_type": "ocr_check_same_row_image", "anchor_text": "功能名称B", "image_base64": "<base64_encoded_image>", "threshold": 0.8}
  # 示例 2: 检查第二个锚点文本同一行的图片
  # {"action_type": "ocr_check_same_row_image", "anchor_text": "功能名称", "anchor_index": 1, "image_base64": "<base64_encoded_image>"}

  # ---------- 图像识别动作 ----------
  # image_click - 点击匹配的图像
  # 示例 1: 点击图像，匹配阈值 0.9
  # {"action_type": "image_click", "image_base64": "<base64_encoded_image>", "threshold": 0.9}
  # 示例 2: 点击第二个匹配的图像
  # {"action_type": "image_click", "image_base64": "<base64_encoded_image>", "index": 1}
  # 示例 3: 仅在屏幕左上四分之一区域查找并点击图像
  # {"action_type": "image_click", "image_base64": "<base64_encoded_image>", "region": [0, 0, 960, 540]}

  # image_wait - 等待图像出现
  # 示例 1: 等待图像出现，最多等 8 秒
  # {"action_type": "image_wait", "image_base64": "<base64_encoded_image>", "timeout": 8000, "threshold": 0.85}
  # 示例 2: 等待第二个匹配的图像出现
  # {"action_type": "image_wait", "image_base64": "<base64_encoded_image>", "index": 1}

  # image_assert - 断言图像存在（单次截图断言，不使用 timeout）
  # 示例 1: 断言图像存在
  # {"action_type": "image_assert", "image_base64": "<base64_encoded_image>", "threshold": 0.8}
  # 示例 2: 断言第二个匹配的图像存在
  # {"action_type": "image_assert", "image_base64": "<base64_encoded_image>", "index": 1}

  # image_click_near_text - 点击文本附近最近的图像
  # 示例: 点击"密码"文字附近 500 像素范围内的输入框图标
  # {"action_type": "image_click_near_text", "image_base64": "<base64_encoded_image>", "value": "密码", "end_x": 500}

  # image_move - 移动鼠标到匹配的图像位置（仅桌面端支持）
  # 示例 1: 移动鼠标到图像位置，匹配阈值 0.9
  # {"action_type": "image_move", "image_base64": "<base64_encoded_image>", "threshold": 0.9}
  # 示例 2: 移动鼠标到图像位置并向右偏移 20 像素
  # {"action_type": "image_move", "image_base64": "<base64_encoded_image>", "offset": {"x": 20, "y": 0}}
  # 示例 3: 移动鼠标到第二个匹配的图像位置
  # {"action_type": "image_move", "image_base64": "<base64_encoded_image>", "index": 1}

  # image_double_click - 双击匹配的图像位置
  # 示例 1: 双击图像，匹配阈值 0.9
  # {"action_type": "image_double_click", "image_base64": "<base64_encoded_image>", "threshold": 0.9}
  # 示例 2: 双击第二个匹配的图像
  # {"action_type": "image_double_click", "image_base64": "<base64_encoded_image>", "index": 1}
  # 示例 3: 双击图像并偏移
  # {"action_type": "image_double_click", "image_base64": "<base64_encoded_image>", "offset": {"x": 10, "y": 5}}

  # image_exist - 检查图像是否存在
  # 返回 {"exists": true} 或 {"exists": false}，无论是否存在都返回 SUCCESS 状态
  # 示例 1: 检查图像是否存在，匹配阈值 0.8
  # {"action_type": "image_exist", "image_base64": "<base64_encoded_image>", "threshold": 0.8}
  # 示例 2: 检查第二个匹配的图像是否存在
  # {"action_type": "image_exist", "image_base64": "<base64_encoded_image>", "index": 1}

  # ---------- 坐标动作 ----------
  # click - 点击指定坐标
  # 示例: 点击屏幕坐标 (500, 300)
  # {"action_type": "click", "x": 500, "y": 300}

  # double_click - 双击指定坐标
  # 示例 1: 双击屏幕坐标 (500, 300)
  # {"action_type": "double_click", "x": 500, "y": 300}
  # 示例 2: 双击坐标并偏移
  # {"action_type": "double_click", "x": 500, "y": 300, "offset": {"x": 10, "y": 5}}

  # move - 移动鼠标到指定坐标（仅桌面端支持）
  # 示例 1: 移动鼠标到坐标 (500, 300)
  # {"action_type": "move", "x": 500, "y": 300}
  # 示例 2: 移动鼠标到坐标并偏移
  # {"action_type": "move", "x": 500, "y": 300, "offset": {"x": 10, "y": 5}}

  # swipe - 滑动手势
  # 示例 1: 从 (500, 1000) 滑动到 (500, 500)，耗时 500ms
  # {"action_type": "swipe", "from": {"x": 500, "y": 1000}, "to": {"x": 500, "y": 500}, "duration": 500}
  # 示例 2: 向左滑动（翻页）
  # {"action_type": "swipe", "from": {"x": 800, "y": 500}, "to": {"x": 200, "y": 500}, "duration": 300}

  # input - 在指定坐标输入文本
  # 示例: 在 (300, 400) 位置输入 "hello world"
  # {"action_type": "input", "x": 300, "y": 400, "text": "hello world"}

  # ---------- 其他动作 ----------
  # press - 按键操作
  # 示例 1: 按回车键
  # {"action_type": "press", "key": "Enter"}
  # 示例 2: 按 Escape 键
  # {"action_type": "press", "key": "Escape"}
  # 示例 3: 按下箭头键
  # {"action_type": "press", "key": "ArrowDown"}
  # 示例 4: Ctrl+A 全选（组合键）
  # {"action_type": "press", "key": "Control+A"}

  # screenshot - 截图
  # 示例: 截取当前屏幕，命名为 "result"
  # {"action_type": "screenshot", "value": "result"}

  # wait - 固定等待
  # 示例: 等待 2 秒
  # {"action_type": "wait", "value": "2000"}

  # start_app - 启动应用/浏览器
  # 示例 1 (Web): 启动 Chromium 浏览器
  # {"action_type": "start_app", "value": "chromium"}
  # 示例 2 (Web): 启动 Firefox 浏览器
  # {"action_type": "start_app", "value": "firefox"}
  # 示例 3 (Android): 启动应用
  # {"action_type": "start_app", "value": "com.example.app"}
  # 示例 4 (iOS): 启动应用
  # {"action_type": "start_app", "value": "com.example.app"}

  # stop_app - 关闭应用/浏览器
  # 示例 1: 关闭当前应用/浏览器
  # {"action_type": "stop_app"}
  # 示例 2 (Android): 关闭指定应用
  # {"action_type": "stop_app", "value": "com.example.app"}

  # navigate - 跳转 URL（仅 Web 平台）
  # 示例: 跳转到示例网站
  # {"action_type": "navigate", "value": "https://example.com"}

  # switched_page - 切换到指定页面（仅 Web 平台）
  # 示例 1: 切换到第 1 个页面（第一个打开的标签页）
  # {"action_type": "switched_page", "value": "1"}
  # 示例 2: 切换到第 2 个页面
  # {"action_type": "switched_page", "value": "2"}
  # 示例 3: 切换到第 3 个页面
  # {"action_type": "switched_page", "value": "3"}

  # close_page - 关闭当前页面（仅 Web 平台）
  # 关闭后会自动切换到浏览器当前显示的页面
  # 示例: 关闭当前页面
  # {"action_type": "close_page"}

  # ---------- 系统级操作示例（仅 Web 平台，level: system） ----------
  # 使用场景：Web 会议共享桌面弹出的原生选择框、文件上传原生对话框等
  # Playwright 无法截取浏览器外部的原生对话框，需使用系统级操作

  # 示例 1: 系统级截图（截取第一个显示器，包括原生对话框）
  # {"action_type": "screenshot", "value": "native_dialog", "level": "system"}

  # 示例 2: 系统级截图（截取副屏幕）
  # {"action_type": "screenshot", "value": "screen2", "level": "system", "monitor": 2}

  # 示例 3: 系统级 OCR 点击（点击原生对话框中的文字）
  # {"action_type": "ocr_click", "value": "屏幕 1", "level": "system"}

  # 示例 4: 系统级 OCR 点击（在副屏幕上操作）
  # {"action_type": "ocr_click", "value": "确认", "level": "system", "monitor": 2}

  # 示例 5: 系统级坐标点击（点击原生对话框中的坐标）
  # {"action_type": "click", "x": 500, "y": 300, "level": "system"}

  # 示例 6: 系统级按键（在原生对话框中按键）
  # {"action_type": "press", "key": "Enter", "level": "system"}

  # 示例 7: 系统级等待文字（等待原生对话框文字出现）
  # {"action_type": "ocr_wait", "value": "共享", "timeout": 5000, "level": "system"}

  # 示例 8: 系统级图像点击（在原生对话框中点击图像图标）
  # {"action_type": "image_click", "image_base64": "<base64>", "level": "system"}

  # 示例 9: 系统级图像等待（等待原生对话框中的图标出现）
  # {"action_type": "image_wait", "image_base64": "<base64>", "timeout": 5000, "level": "system"}

  # 示例 10: 处理文件上传原生对话框（点击上传按钮触发对话框后）
  # 第一步：点击上传按钮（browser 级别，触发原生文件选择器）
  # {"action_type": "click", "x": 500, "y": 300}
  # 第二步：等待并操作原生文件选择器（system 级别）
  # {"action_type": "ocr_click", "value": "选择文件", "level": "system"}
  # {"action_type": "press", "key": "Enter", "level": "system"}

  # ocr_get_position - 获取文字坐标列表
  # 返回 {"positions": [[x1, y1], [x2, y2], ...]}
  # 坐标顺序：精确匹配 → 模糊匹配
  # 示例 1: 获取"登录"文字的所有坐标
  # {"action_type": "ocr_get_position", "value": "登录"}
  # 示例 2: 使用正则匹配获取所有数字坐标
  # {"action_type": "ocr_get_position", "value": "reg_\\d+"}

  # image_get_position - 获取图片坐标列表
  # 返回 {"positions": [[x1, y1], [x2, y2], ...]}
  # 示例: 获取匹配图片的所有坐标
  # {"action_type": "image_get_position", "image_base64": "<base64_encoded_image>", "threshold": 0.8}

