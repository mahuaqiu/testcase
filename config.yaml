# testcase 工程配置文件

# 资源管理服务配置
resource_manager:
  # 资源管理服务地址，为空时使用 mock_users 本地调试
  base_url: "http://192.168.0.102:8000"
  # namespace: 机器分类名称（用于申请执行机）
  namespace: "meeting_public"
  timeout: 30
  # 本地调试模式：预设用户资源（当 base_url 为空时生效）
  mock_users:
    userA:
      ip: "192.168.0.102"
      port: 8088
      account: ""
      password: ""
    userB:
      ip: "192.168.0.103"
      port: 8080
      account: "test_user_b"
      password: "Password@456"

# 平台默认 hooks 配置
hooks:
  windows:
    setup: ["start_app"]
    teardown: ["stop_app"]
  web:
    setup: ["start_app"]
    teardown: ["stop_app"]
  ios:
    setup: ["start_app"]
    teardown: ["stop_app"]
  android:
    setup: ["start_app"]
    teardown: ["stop_app"]
  mac:
    setup: ["start_app"]
    teardown: ["stop_app"]
  # API 平台 hooks
  api:
    setup: []
    teardown: ["cancel_all_meetings"]

# testagent 服务配置
testagent:
  connect_timeout: 15  # TCP 连接超时（秒）
  read_timeout: 60     # 读取响应超时（秒）

# 测试配置
test:
  screenshot_dir: "screenshots"
  screenshot_on_failure: true