# testcase 工程配置文件

# 资源管理服务配置
resource_manager:
  # 资源管理服务地址，为空时使用 mock_users 本地调试
  base_url: ""
  timeout: 30
  # 本地调试模式：预设用户资源（当 base_url 为空时生效）
  mock_users:
    userA:
      account: "test_user_a"
      password: "Password@123"
      ip: "127.0.0.1"
      type: "normal"
    userB:
      account: "test_user_b"
      password: "Password@456"
      ip: "127.0.0.1"
      type: "normal"

# testagent 服务配置
testagent:
  base_url: "http://localhost:8080"
  timeout: 300

# 测试配置
test:
  screenshot_dir: "screenshots"
  screenshot_on_failure: true