[pytest]
testpaths = testcases/windows testcases/web testcases/mac testcases/ios testcases/android testcases/common testcases/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v -s --tb=short --strict-markers
markers =
    windows: Windows 端测试
    web: Web 端测试
    mac: Mac 端测试
    ios: iOS 端测试
    android: Android 端测试
    smoke: 冒烟测试
    regression: 回归测试
filterwarnings =
    ignore::DeprecationWarning